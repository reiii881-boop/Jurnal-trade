<script type="text/babel" data-presets="react">
// ==========================================================================
// TradeJournal Pro — Core utilities, IndexedDB layer, metrics engine
// ==========================================================================
const { useState, useEffect, useRef, useMemo, useCallback, Fragment } = React;

/* ---------------------------- IndexedDB layer ---------------------------- */
const DB_NAME = 'TradeJournalProDB';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('profiles')) {
        db.createObjectStore('profiles', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('trades')) {
        const s = db.createObjectStore('trades', { keyPath: 'id' });
        s.createIndex('profileId', 'profileId', { unique: false });
      }
      if (!db.objectStoreNames.contains('journals')) {
        const s = db.createObjectStore('journals', { keyPath: 'id' });
        s.createIndex('profileId', 'profileId', { unique: false });
      }
      if (!db.objectStoreNames.contains('targets')) {
        db.createObjectStore('targets', { keyPath: 'profileId' });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll(storeName, indexName, indexValue) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const target = indexName ? store.index(indexName) : store;
    const req = indexValue !== undefined ? target.getAll(indexValue) : target.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(storeName, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(value);
    tx.oncomplete = () => resolve(value);
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbClearByIndex(storeName, indexName, indexValue) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.openCursor(IDBKeyRange.only(indexValue));
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) { cursor.delete(); cursor.continue(); }
    };
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbClearAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function uid() {

  return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

function fmtCurrency(n, opts = {}) {
  const v = Number(n) || 0;
  const sign = v > 0 ? '+' : v < 0 ? '-' : '';
  const abs = Math.abs(v);
  return (opts.sign ? sign : '') + '$' + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtNum(n, d = 2) {
  const v = Number(n);
  if (!isFinite(v)) return '0';
  return v.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtPct(n, d = 1) {
  const v = Number(n) || 0;
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(d) + '%';
}
function fmtDate(d, opts) {
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : d;
  if (isNaN(dt)) return '-';
  return dt.toLocaleDateString('id-ID', opts || { day: '2-digit', month: 'short', year: 'numeric' });
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function monthKey(dateStr) { return (dateStr || '').slice(0, 7); }

function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }

function downloadBlob(filename, content, mime) {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime || 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* -------------------------------- Metrics -------------------------------- */
// Sort trades chronologically by date then optional entryTime
function sortTradesChrono(trades) {
  return [...trades].sort((a, b) => {
    const da = (a.date || '') + 'T' + (a.entryTime || '00:00');
    const db_ = (b.date || '') + 'T' + (b.entryTime || '00:00');
    return da < db_ ? -1 : da > db_ ? 1 : 0;
  });
}

function computeMetrics(trades, profile) {
  const initial = Number(profile?.initialBalance) || 0;
  const sorted = sortTradesChrono(trades);
  const n = sorted.length;

  let balance = initial;
  let highest = initial;
  let peakBeforeTrade = initial;
  const equityPoints = [{ label: 'Start', date: null, balance: initial, drawdownPct: 0 }];
  let maxDrawdownPct = 0;
  let maxDrawdownVal = 0;
  let runningWin = 0, runningLoss = 0, longestWin = 0, longestLoss = 0;
  let wins = 0, losses = 0, breakeven = 0;
  let grossProfit = 0, grossLoss = 0;
  let sumRR = 0, rrCount = 0;
  let followedPlanCount = 0;
  const byDate = {};
  const byPair = {};
  const bySession = {};
  const byStrategy = {};
  const byMonth = {};
  const riskBuckets = { '0-0.5%': 0, '0.5-1%': 0, '1-2%': 0, '2-3%': 0, '3%+': 0 };
  let holdMinutesSum = 0, holdCount = 0;

  sorted.forEach((t) => {
    const pl = Number(t.pl) || 0;
    balance += pl;
    highest = Math.max(highest, balance);
    const dd = highest > 0 ? ((highest - balance) / highest) * 100 : 0;
    maxDrawdownPct = Math.max(maxDrawdownPct, dd);
    maxDrawdownVal = Math.max(maxDrawdownVal, highest - balance);
    equityPoints.push({ label: t.date, date: t.date, balance, drawdownPct: dd, pl });

    if (pl > 0) { wins++; grossProfit += pl; runningWin++; runningLoss = 0; longestWin = Math.max(longestWin, runningWin); }
    else if (pl < 0) { losses++; grossLoss += Math.abs(pl); runningLoss++; runningWin = 0; longestLoss = Math.max(longestLoss, runningLoss); }
    else { breakeven++; runningWin = 0; runningLoss = 0; }

    if (t.rrTarget) { sumRR += Number(t.rrTarget) || 0; rrCount++; }
    if (t.followedPlan === 'yes') followedPlanCount++;

    byDate[t.date] = (byDate[t.date] || 0) + pl;
    if (t.pair) byPair[t.pair] = (byPair[t.pair] || { pl: 0, count: 0, wins: 0 }), byPair[t.pair].pl += pl, byPair[t.pair].count++, (pl>0 && byPair[t.pair].wins++);
    if (t.session) bySession[t.session] = (bySession[t.session] || { pl: 0, count: 0, wins: 0 }), bySession[t.session].pl += pl, bySession[t.session].count++, (pl>0 && bySession[t.session].wins++);
    if (t.strategy) byStrategy[t.strategy] = (byStrategy[t.strategy] || { pl: 0, count: 0, wins: 0 }), byStrategy[t.strategy].pl += pl, byStrategy[t.strategy].count++, (pl>0 && byStrategy[t.strategy].wins++);
    const mk = monthKey(t.date);
    if (mk) byMonth[mk] = (byMonth[mk] || 0) + pl;

    const risk = Number(t.riskPct) || 0;
    if (risk <= 0.5) riskBuckets['0-0.5%']++;
    else if (risk <= 1) riskBuckets['0.5-1%']++;
    else if (risk <= 2) riskBuckets['1-2%']++;
    else if (risk <= 3) riskBuckets['2-3%']++;
    else riskBuckets['3%+']++;

    if (t.entryTime && t.exitTime) {
      const [eh, em] = t.entryTime.split(':').map(Number);
      const [xh, xm] = t.exitTime.split(':').map(Number);
      let mins = (xh * 60 + xm) - (eh * 60 + em);
      if (mins < 0) mins += 24 * 60;
      holdMinutesSum += mins; holdCount++;
    }
  });

  const winRate = n > 0 ? (wins / n) * 100 : 0;
  const profitFactor = grossLoss > 0 ? grossProfit / grossLoss : (grossProfit > 0 ? Infinity : 0);
  const avgWin = wins > 0 ? grossProfit / wins : 0;
  const avgLoss = losses > 0 ? grossLoss / losses : 0;
  const avgRR = rrCount > 0 ? sumRR / rrCount : 0;
  const expectancy = n > 0 ? ((winRate / 100) * avgWin) - (((100 - winRate) / 100) * avgLoss) : 0;
  const netPL = balance - initial;
  const roi = initial > 0 ? (netPL / initial) * 100 : 0;
  const currentDrawdownPct = highest > 0 ? ((highest - balance) / highest) * 100 : 0;
  const currentDrawdownVal = highest - balance;
  const planAdherence = n > 0 ? (followedPlanCount / n) * 100 : 0;

  const dateEntries = Object.entries(byDate);
  let bestDay = null, worstDay = null;
  dateEntries.forEach(([date, pl]) => {
    if (!bestDay || pl > bestDay.pl) bestDay = { date, pl };
    if (!worstDay || pl < worstDay.pl) worstDay = { date, pl };
  });

  function bestWorst(map) {
    let best = null, worst = null;
    Object.entries(map).forEach(([k, v]) => {
      if (!best || v.pl > best.pl) best = { key: k, ...v };
      if (!worst || v.pl < worst.pl) worst = { key: k, ...v };
    });
    return { best, worst };
  }
  const pairBW = bestWorst(byPair);
  const sessionBW = bestWorst(bySession);
  const strategyBW = bestWorst(byStrategy);

  const avgHoldingMinutes = holdCount > 0 ? holdMinutesSum / holdCount : null;

  return {
    n, wins, losses, breakeven, winRate, grossProfit, grossLoss, profitFactor,
    avgWin, avgLoss, avgRR, expectancy, netPL, roi, initial, balance,
    currentEquity: balance, highestEquity: highest,
    currentDrawdownPct, currentDrawdownVal, maxDrawdownPct, maxDrawdownVal,
    equityPoints, byDate, byPair, bySession, byStrategy, byMonth, riskBuckets,
    bestDay, worstDay, longestWin, longestLoss, pairBW, sessionBW, strategyBW,
    avgHoldingMinutes, planAdherence,
  };
}

function fmtHoldingTime(mins) {
  if (mins === null || mins === undefined || isNaN(mins)) return 'N/A';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  if (h === 0) return m + 'm';
  return h + 'j ' + m + 'm';
}

// Weekly buckets within a given month (day 1-7, 8-14, 15-21, 22-28, 29-31)
function weeklyPLForMonth(trades, year, month) {
  const weeks = [0, 0, 0, 0, 0];
  trades.forEach((t) => {
    if (!t.date) return;
    const d = new Date(t.date + 'T00:00:00');
    if (d.getFullYear() !== year || d.getMonth() !== month) return;
    const day = d.getDate();
    const idx = clamp(Math.floor((day - 1) / 7), 0, 4);
    weeks[idx] += Number(t.pl) || 0;
  });
  return weeks;
}

  }, [open]);
  if (!open) return null;
  return ReactDOM.createPortal(
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
      <div className="absolute inset-0 bg-[#04060F]/75 backdrop-blur-sm anim-in" style={{ animationDuration: '.18s' }} onClick={onClose} />

        {footer && <div className="px-5 sm:px-6 py-4 border-t border-white/[0.06] flex items-center justify-end gap-2 shrink-0">{footer}</div>}

    </div>, document.getElementById('portal-root'));

        <div key={t.id} className={`pointer-events-auto anim-pop glass rounded-xl px-4 py-3 shadow-card flex items-center gap-2.5 min-w-[220px] max-w-[340px] border-l-2 ${t.tone === 'up' ? 'border-l-up' : t.tone === 'down' ? 'border-l-down' : 'border-l-brand'}`}>
          <Icon name={t.tone === 'up' ? 'check' : t.tone === 'down' ? 'alert' : 'info'} className={`w-4 h-4 shrink-0 ${t.tone === 'up' ? 'text-up' : t.tone === 'down' ? 'text-down' : 'text-brand'}`} />
          <span className="text-sm text-slate-200">{t.msg}</span>
          <button onClick={() => remove(t.id)} className="ml-auto text-slate-500 hover:text-white"><Icon name="close" className="w-3.5 h-3.5" /></button>
        </div>
      ))}
    </div>, document.getElementById('portal-root'));
}

function useToasts() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, tone = 'brand') => {
    const id = uid();
    setToasts(t => [...t, { id, msg, tone }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  }, []);
  const remove = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
  return { toasts, push, remove };
}

/* ------------------------------ Image upload / lightbox ------------------------------ */
function ImageDrop({ label, value, onChange }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  async function handleFiles(files) {
    const file = files && files[0];
    if (!file) return;
    if (!/^image\/(png|jpe?g|webp)$/i.test(file.type)) return;
    const dataUrl = await fileToDataURL(file);
    onChange(dataUrl);
  }

  return (
    <div>
      <span className="block text-xs font-medium text-slate-400 mb-1.5">{label}</span>
      {value ? (
        <div className="relative group rounded-xl overflow-hidden border border-white/10 h-28">
          <img src={value} className="w-full h-full object-cover cursor-zoom-in" onClick={() => window.__openLightbox && window.__openLightbox(value)} />
          <button type="button" onClick={() => onChange(null)} className="absolute top-1.5 right-1.5 bg-black/60 hover:bg-down/80 text-white rounded-lg p-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <Icon name="close" className="w-3.5 h-3.5" />
          </button>
        </div>
      ) : (
        <div
          onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
          onClick={() => inputRef.current?.click()}
          className={`h-28 rounded-xl border-2 border-dashed flex flex-col items-center justify-center gap-1 cursor-pointer transition-colors ${dragOver ? 'border-brand bg-brand-soft' : 'border-white/10 hover:border-white/20 bg-white/[0.02]'}`}>
          <Icon name="upload" className="w-5 h-5 text-slate-500" />
          <span className="text-[11px] text-slate-500 text-center px-2">Tarik gambar atau klik<br />JPG · PNG · WEBP</span>
          <input ref={inputRef} type="file" accept="image/png,image/jpeg,image/jpg,image/webp" className="hidden" onChange={(e) => handleFiles(e.target.files)} />
        </div>
      )}
    </div>
  );
}

function Lightbox() {
  const [src, setSrc] = useState(null);
  useEffect(() => { window.__openLightbox = (s) => setSrc(s); return () => { window.__openLightbox = null; }; }, []);
  if (!src) return null;
  return ReactDOM.createPortal(
    <div className="fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6 anim-in" style={{ animationDuration: '.15s' }} onClick={() => setSrc(null)}>
      <button className="absolute top-5 right-5 text-white/70 hover:text-white p-2 rounded-lg hover:bg-white/10" onClick={() => setSrc(null)}>
        <Icon name="close" className="w-6 h-6" />
      </button>
      <img src={src} className="max-w-full max-h-full rounded-lg shadow-2xl object-contain" onClick={(e) => e.stopPropagation()} />
    </div>, document.getElementById('portal-root'));
}

/* ------------------------------ Profile Manager Modal ------------------------------ */
function ProfileManagerModal({ open, onClose, profiles, activeProfileId, onSwitch, onSave, onDelete, onResetTrades, onExportProfile, onImportProfile, onBackupAll, onRestoreAll, push }) {
  const [mode, setMode] = useState('list'); // list | edit
  const [editing, setEditing] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [confirmReset, setConfirmReset] = useState(null);
  const fileImportRef = useRef(null);
  const fileRestoreRef = useRef(null);

  useEffect(() => { if (open) { setMode('list'); setEditing(null); } }, [open]);

  function startEdit(p) {
    setEditing({ ...p, initialBalance: String(p.initialBalance), maxDailyLossPct: String(p.maxDailyLossPct), maxTotalDrawdownPct: String(p.maxTotalDrawdownPct) });
    setMode('edit');
  }
  function startAdd() {
    setEditing({ id: null, traderName: '', accountName: '', accountType: 'demo', initialBalance: '', maxDailyLossPct: '5', maxTotalDrawdownPct: '10' });
    setMode('edit');
  }
  function saveEdit(e) {
    e.preventDefault();
    if (!editing.traderName.trim() || !editing.accountName.trim() || !editing.initialBalance) { push('Lengkapi field wajib', 'down'); return; }
    onSave({
      id: editing.id || uid(),
      traderName: editing.traderName.trim(),
      accountName: editing.accountName.trim(),
      accountType: editing.accountType,
      initialBalance: Number(editing.initialBalance),
      maxDailyLossPct: Number(editing.maxDailyLossPct) || 0,
      maxTotalDrawdownPct: Number(editing.maxTotalDrawdownPct) || 0,
      createdAt: editing.createdAt || new Date().toISOString(),
    });
    setMode('list');
  }

  return (
    <Modal open={open} onClose={onClose} title={mode === 'list' ? 'Kelola Profil' : (editing?.id ? 'Edit Profil' : 'Tambah Profil')} maxWidth="max-w-lg">
      {mode === 'list' ? (
        <div className="space-y-5">
          <div className="space-y-2">
            {profiles.map(p => (
              <div key={p.id} className={`rounded-xl border p-3.5 flex items-center gap-3 ${p.id === activeProfileId ? 'border-brand/40 bg-brand-soft' : 'border-white/10 bg-white/[0.02]'}`}>
                <div className={`w-9 h-9 rounded-lg flex items-center justify-center shrink-0 ${p.accountType === 'prop' ? 'bg-amber-soft text-amber' : p.accountType === 'live' ? 'bg-up-soft text-up' : 'bg-brand-soft text-brand'}`}>
                  <Icon name="wallet" className="w-[18px] h-[18px]" />
                </div>
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-medium text-slate-100 truncate flex items-center gap-1.5">{p.accountName}
                    {p.id === activeProfileId && <Badge tone="brand">Aktif</Badge>}
                  </div>
                  <div className="text-[11px] text-slate-500 truncate">{p.traderName} · {ACCOUNT_TYPES.find(a=>a.value===p.accountType)?.label} · ${Number(p.initialBalance).toLocaleString()}</div>
                </div>
                <div className="flex items-center gap-1 shrink-0">
                  {p.id !== activeProfileId && <button title="Gunakan" onClick={() => onSwitch(p.id)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400 hover:text-brand"><Icon name="check" className="w-4 h-4" /></button>}
                  <button title="Export" onClick={() => onExportProfile(p.id)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400 hover:text-white"><Icon name="download" className="w-4 h-4" /></button>
                  <button title="Edit" onClick={() => startEdit(p)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400 hover:text-white"><Icon name="edit" className="w-4 h-4" /></button>
                  <button title="Reset trade" onClick={() => setConfirmReset(p.id)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400 hover:text-amber"><Icon name="refresh" className="w-4 h-4" /></button>
                  <button title="Hapus" onClick={() => setConfirmDelete(p.id)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400 hover:text-down"><Icon name="trash" className="w-4 h-4" /></button>
                </div>
              </div>
            ))}
          </div>
          <Button variant="ghost" size="sm" className="w-full" onClick={startAdd}><Icon name="plus" className="w-4 h-4" /> Tambah Profil</Button>

          <div className="pt-4 border-t border-white/[0.06]">
            <div className="text-xs font-medium text-slate-400 mb-2.5">Backup & Restore Semua Data</div>
            <div className="grid grid-cols-2 gap-2">
              <Button variant="outline" size="sm" onClick={onBackupAll}><Icon name="save" className="w-4 h-4" /> Backup (JSON)</Button>
              <Button variant="outline" size="sm" onClick={() => fileRestoreRef.current?.click()}><Icon name="upload" className="w-4 h-4" /> Restore Backup</Button>
              <input ref={fileRestoreRef} type="file" accept="application/json" className="hidden" onChange={(e) => { if (e.target.files[0]) onRestoreAll(e.target.files[0]); e.target.value=''; }} />
              <Button variant="outline" size="sm" onClick={() => fileImportRef.current?.click()} className="col-span-2"><Icon name="upload" className="w-4 h-4" /> Import Profil dari File</Button>
              <input ref={fileImportRef} type="file" accept="application/json" className="hidden" onChange={(e) => { if (e.target.files[0]) onImportProfile(e.target.files[0]); e.target.value=''; }} />
            </div>
          </div>
        </div>
      ) : (
        <form onSubmit={saveEdit} className="space-y-4">
          <Field label="Nama Trader" required><TextInput value={editing.traderName} onChange={e => setEditing({ ...editing, traderName: e.target.value })} /></Field>
          <Field label="Nama Akun" required><TextInput value={editing.accountName} onChange={e => setEditing({ ...editing, accountName: e.target.value })} /></Field>
          <Field label="Jenis Akun" required>
            <SegButton className="w-full" options={ACCOUNT_TYPES} value={editing.accountType} onChange={v => setEditing({ ...editing, accountType: v })} />
          </Field>
          <Field label="Modal Awal ($)" required><TextInput type="number" min="0" step="0.01" value={editing.initialBalance} onChange={e => setEditing({ ...editing, initialBalance: e.target.value })} /></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Max Daily Loss (%)"><TextInput type="number" min="0" step="0.1" value={editing.maxDailyLossPct} onChange={e => setEditing({ ...editing, maxDailyLossPct: e.target.value })} /></Field>
            <Field label="Max Total DD (%)"><TextInput type="number" min="0" step="0.1" value={editing.maxTotalDrawdownPct} onChange={e => setEditing({ ...editing, maxTotalDrawdownPct: e.target.value })} /></Field>
          </div>
          <div className="flex gap-2 justify-end pt-2">
            <Button type="button" variant="ghost" size="sm" onClick={() => setMode('list')}>Batal</Button>
            <Button type="submit" variant="primary" size="sm"><Icon name="save" className="w-4 h-4" /> Simpan</Button>
          </div>
        </form>
      )}

      <ConfirmDialog open={!!confirmDelete} onClose={() => setConfirmDelete(null)} title="Hapus Profil?"
        message="Semua trade dan jurnal pada profil ini akan dihapus permanen. Tindakan ini tidak dapat dibatalkan."
        onConfirm={() => { onDelete(confirmDelete); setConfirmDelete(null); }} />
      <ConfirmDialog open={!!confirmReset} onClose={() => setConfirmReset(null)} title="Reset Semua Trade?"
        message="Seluruh riwayat trade pada profil ini akan dihapus. Profil dan pengaturan tetap tersimpan."
        onConfirm={() => { onResetTrades(confirmReset); setConfirmReset(null); }} />
    </Modal>
  );
}

/* -------------------------------- Calendar -------------------------------- */
function TradingCalendar({ trades, cursor, setCursor, onDayClick, selectedDate }) {
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay(); // 0 Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = todayISO();

  const dayMap = useMemo(() => {
    const m = {};
    trades.forEach(t => {
      if (!t.date) return;
      const d = new Date(t.date + 'T00:00:00');
      if (d.getFullYear() !== year || d.getMonth() !== month) return;
      if (!m[t.date]) m[t.date] = { pl: 0, count: 0 };
      m[t.date].pl += Number(t.pl) || 0;
      m[t.date].count++;
    });
    return m;
  }, [trades, year, month]);

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const weekDays = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
  const monthLabel = cursor.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

  return (
    <Card className="p-4 sm:p-5">
      <div className="flex items-center justify-between mb-4">
        <h3 className="font-display font-semibold text-sm text-slate-200 capitalize">{monthLabel}</h3>
        <div className="flex items-center gap-1">
          <button onClick={() => setCursor(new Date(year, month - 1, 1))} className="p-1.5 rounded-lg hover:bg-white/[0.07] text-slate-400"><Icon name="chevronLeft" className="w-4 h-4" /></button>
          <button onClick={() => setCursor(new Date())} className="text-[11px] px-2 py-1 rounded-lg hover:bg-white/[0.07] text-slate-500 font-medium">Hari ini</button>
          <button onClick={() => setCursor(new Date(year, month + 1, 1))} className="p-1.5 rounded-lg hover:bg-white/[0.07] text-slate-400"><Icon name="chevronRight" className="w-4 h-4" /></button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1.5 mb-1.5">
        {weekDays.map(w => <div key={w} className="text-center text-[10px] font-medium text-slate-600 py-1">{w}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1.5">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} />;
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const info = dayMap[dateStr];
          const isToday = dateStr === todayStr;
          const isSelected = dateStr === selectedDate;
          const isProfit = info && info.pl > 0;
          const isLoss = info && info.pl < 0;
          return (
            <button key={i} onClick={() => onDayClick(dateStr)}
              className={`aspect-square rounded-lg flex flex-col items-center justify-center gap-0.5 text-[10px] transition-all relative
                ${isSelected ? 'ring-2 ring-brand' : ''}
                ${isProfit ? 'bg-up-soft hover:bg-up/20' : isLoss ? 'bg-down-soft hover:bg-down/20' : 'bg-white/[0.02] hover:bg-white/[0.05]'}
              `}>
              <span className={`text-[11px] font-medium ${isToday ? 'text-brand font-bold' : isProfit ? 'text-up-text' : isLoss ? 'text-down-text' : 'text-slate-500'}`}>{d}</span>
              {info && (
                <span className={`text-[9px] font-semibold num leading-none ${isProfit ? 'text-up-text' : 'text-down-text'}`}>
                  {isProfit ? '+' : ''}{Math.abs(info.pl) >= 1000 ? (info.pl/1000).toFixed(1)+'k' : info.pl.toFixed(0)}
                </span>
              )}
              {info && <span className="text-[8px] text-slate-600 leading-none">{info.count}x</span>}
              {isToday && <span className="absolute top-0.5 right-0.5 w-1 h-1 rounded-full bg-brand" />}
            </button>
          );
        })}
      </div>
      <div className="flex items-center gap-4 mt-4 pt-3 border-t border-white/[0.06]">
        <div className="flex items-center gap-1.5 text-[11px] text-slate-500"><span className="w-2.5 h-2.5 rounded bg-up-soft border border-up/30" /> Profit</div>
        <div className="flex items-center gap-1.5 text-[11px] text-slate-500"><span className="w-2.5 h-2.5 rounded bg-down-soft border border-down/30" /> Loss</div>
        <div className="flex items-center gap-1.5 text-[11px] text-slate-500"><span className="w-2.5 h-2.5 rounded bg-white/[0.03] border border-white/10" /> No trade</div>
      </div>
    </Card>
  );
}

function WeeklyPL({ trades, cursor }) {
  const weeks = weeklyPLForMonth(trades, cursor.getFullYear(), cursor.getMonth());
  const activeWeeks = weeks.map((v, i) => ({ label: `Week ${i + 1}`, pl: v })).filter((w, i) => i < 5);
  return (
    <Card className="p-4 sm:p-5 flex flex-col">
      <h3 className="font-display font-semibold text-sm text-slate-200 mb-4">Weekly Profit/Loss</h3>
      <div className="space-y-2.5 flex-1">
        {activeWeeks.map((w, i) => {
          const isUp = w.pl > 0, isDown = w.pl < 0;
          const maxAbs = Math.max(...activeWeeks.map(x => Math.abs(x.pl)), 1);
          const width = clamp((Math.abs(w.pl) / maxAbs) * 100, 0, 100);
          return (
            <div key={i}>
              <div className="flex items-center justify-between text-xs mb-1">
                <span className="text-slate-500">{w.label}</span>
                <span className={`font-semibold num ${isUp ? 'text-up-text' : isDown ? 'text-down-text' : 'text-slate-500'}`}>{isUp ? '+' : ''}{fmtCurrency(w.pl)}</span>
              </div>
              <div className="h-1.5 rounded-full bg-white/[0.05] overflow-hidden">
                <div className={`h-full rounded-full ${isUp ? 'bg-up' : isDown ? 'bg-down' : 'bg-slate-700'}`} style={{ width: (w.pl===0?0:width) + '%' }} />
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function statusLevel(usedPct) {
  if (usedPct >= 90) return { key: 'danger', label: 'Melebihi Batas', emoji: '🔴', color: 'text-down', dot: 'bg-down', bar: 'down' };
  if (usedPct >= 60) return { key: 'warn', label: 'Mendekati Batas', emoji: '🟡', color: 'text-amber', dot: 'bg-amber', bar: 'amber' };
  return { key: 'safe', label: 'Aman', emoji: '🟢', color: 'text-up', dot: 'bg-up', bar: 'up' };
}

function computePropStatus(trades, profile, metrics) {
  if (!profile || profile.accountType !== 'prop') return null;
  const initial = Number(profile.initialBalance) || 0;
  const today = todayISO();
  const todayPL = trades.filter(t => t.date === today).reduce((s, t) => s + (Number(t.pl) || 0), 0);
  const todayLoss = todayPL < 0 ? Math.abs(todayPL) : 0;

  const dailyLimitPct = Number(profile.maxDailyLossPct) || 0;
  const dailyLimitVal = initial * (dailyLimitPct / 100);
  const dailyUsedPct = dailyLimitVal > 0 ? (todayLoss / dailyLimitVal) * 100 : 0;
  const dailyRemaining = Math.max(0, dailyLimitVal - todayLoss);

  const totalLimitPct = Number(profile.maxTotalDrawdownPct) || 0;
  const totalLimitVal = metrics.highestEquity * (totalLimitPct / 100);
  const totalUsedPct = totalLimitVal > 0 ? (metrics.currentDrawdownVal / totalLimitVal) * 100 : 0;
  const totalRemaining = Math.max(0, totalLimitVal - metrics.currentDrawdownVal);

  const dailyStatus = statusLevel(dailyUsedPct);
  const totalStatus = statusLevel(totalUsedPct);
  const overall = (dailyStatus.key === 'danger' || totalStatus.key === 'danger') ? dailyStatus.key === 'danger' ? dailyStatus : totalStatus
    : (dailyStatus.key === 'warn' || totalStatus.key === 'warn') ? (dailyStatus.key === 'warn' ? dailyStatus : totalStatus) : dailyStatus;

  return {
    todayPL, todayLoss, dailyLimitVal, dailyUsedPct: clamp(dailyUsedPct, 0, 999), dailyRemaining, dailyStatus,
    totalLimitVal, totalUsedPct: clamp(totalUsedPct, 0, 999), totalRemaining, totalStatus,
    overall,
  };
}

  const [cursor, setCursor] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(null);
  const [formOpen, setFormOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [prefillDate, setPrefillDate] = useState(null);

  const metrics = useMemo(() => computeMetrics(trades, profile), [trades, profile]);
  const propStatus = useMemo(() => computePropStatus(trades, profile, metrics), [trades, profile, metrics]);

  const monthTrades = useMemo(() => trades.filter(t => monthKey(t.date) === monthKey(cursor.toISOString())), [trades, cursor]);
  const monthPL = monthTrades.reduce((s, t) => s + (Number(t.pl) || 0), 0);

  const dispatch = window.__tjDispatch;

  function openAddForDate(dateStr) {
    setEditing(null); setPrefillDate(dateStr); setFormOpen(true);
  }
  function openEdit(trade) {
    setEditing(trade); setFormOpen(true);
  }

  const balanceBeforeTrade = useMemo(() => {
    if (!editing) return metrics.balance;
    const sorted = sortTradesChrono(trades.filter(t => t.id !== editing.id));
    let b = metrics.initial;
    sorted.forEach(t => { b += Number(t.pl) || 0; });
    return b;
  }, [editing, trades, metrics]);

  return (
    <div className="space-y-5 anim-in">
      <div className="grid lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 space-y-5">
          <TradingCalendar trades={trades} cursor={cursor} setCursor={setCursor} selectedDate={selectedDate}
            onDayClick={(d) => setSelectedDate(d === selectedDate ? null : d)} />
          {selectedDate && <DayTradesPanel date={selectedDate} trades={trades} onEdit={openEdit} onAddForDate={openAddForDate} />}
        </div>
        <WeeklyPL trades={trades} cursor={cursor} />
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3.5">
        {propStatus && <PropFirmCard propStatus={propStatus} />}
        <StatCard label="Monthly P/L" value={fmtCurrency(monthPL, { sign: true })} tone={monthPL > 0 ? 'up' : monthPL < 0 ? 'down' : 'neutral'} icon="wallet" />
        <StatCard label="Win Rate" value={metrics.winRate.toFixed(1) + '%'} sub={`${metrics.wins}W / ${metrics.losses}L`} icon="target" />
        <StatCard label="Best Day" value={metrics.bestDay ? fmtCurrency(metrics.bestDay.pl, { sign: true }) : '-'} sub={metrics.bestDay ? fmtDate(metrics.bestDay.date) : 'Belum ada data'} tone="up" icon="arrowUp" />
        <StatCard label="Worst Day" value={metrics.worstDay ? fmtCurrency(metrics.worstDay.pl, { sign: true }) : '-'} sub={metrics.worstDay ? fmtDate(metrics.worstDay.date) : 'Belum ada data'} tone="down" icon="arrowDown" />
        <StatCard label="Total Trade" value={metrics.n} sub={`${metrics.wins}W · ${metrics.losses}L · ${metrics.breakeven}BE`} icon="activity" />
        <StatCard label="Profit Factor" value={isFinite(metrics.profitFactor) ? metrics.profitFactor.toFixed(2) : '∞'} icon="chart" />
        <StatCard label="Average RR" value={metrics.avgRR.toFixed(2)} icon="target" />
        <StatCard label="Average Win" value={fmtCurrency(metrics.avgWin)} tone="up" icon="arrowUp" />
        <StatCard label="Average Loss" value={fmtCurrency(metrics.avgLoss)} tone="down" icon="arrowDown" />
        <StatCard label="Current Balance" value={fmtCurrency(metrics.balance)} icon="wallet" />
        <StatCard label="Initial Balance" value={fmtCurrency(metrics.initial)} icon="wallet" />
        <StatCard label="Highest Equity" value={fmtCurrency(metrics.highestEquity)} tone="up" icon="arrowUp" />
        <StatCard label="Current Drawdown" value={metrics.currentDrawdownPct.toFixed(1) + '%'} sub={fmtCurrency(metrics.currentDrawdownVal)} tone={metrics.currentDrawdownPct > 0 ? 'down' : 'neutral'} icon="arrowDown" />
      </div>

      <TradeFormModal open={formOpen} onClose={() => setFormOpen(false)}
        initial={editing ? editing : (prefillDate ? { date: prefillDate } : null)}
        balanceBeforeTrade={balanceBeforeTrade}
        onSave={(t) => { dispatch.saveTrade(t); setFormOpen(false); }}
        onRequestDelete={(id) => { dispatch.confirmDeleteTrade(id); setFormOpen(false); }} />
    </div>
  );
}

function exportCSV(trades, profile) {
  const headers = ['Date','Pair','Direction','Session','Strategy','Lot','Entry','SL','TP','Exit','Risk%','RR','PL($)','PL(%)','FollowedPlan','Notes'];
  const rows = trades.map(t => [t.date, t.pair, t.direction, t.session, t.strategy, t.lot, t.entryPrice, t.stopLoss, t.takeProfit, t.exitPrice, t.riskPct, t.rrTarget, t.pl, (t.plPct||0).toFixed(2), t.followedPlan, (t.notes||'').replace(/[\r\n]+/g,' ').replace(/,/g,';')]);
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  downloadBlob(`${(profile?.accountName||'trades').replace(/\s+/g,'_')}_trades.csv`, csv, 'text/csv');
}

function exportExcel(trades, profile) {
  if (!window.XLSX) return;
  const data = trades.map(t => ({
    Date: t.date, Pair: t.pair, Direction: t.direction, Session: t.session, Strategy: t.strategy,
    Lot: t.lot, Entry: t.entryPrice, SL: t.stopLoss, TP: t.takeProfit, Exit: t.exitPrice,
    'Risk%': t.riskPct, RR: t.rrTarget, 'PL($)': t.pl, 'PL(%)': (t.plPct||0).toFixed(2),
    FollowedPlan: t.followedPlan, Notes: t.notes,
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Trades');
  XLSX.writeFile(wb, `${(profile?.accountName||'trades').replace(/\s+/g,'_')}_trades.xlsx`);
}

function exportPDF(trades, profile) {
  if (!window.jspdf) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape' });
  doc.setFontSize(14);
  doc.text(`Trade History — ${profile?.accountName || ''}`, 14, 14);
  doc.setFontSize(9);
  doc.text(`Trader: ${profile?.traderName || '-'}  |  Generated: ${new Date().toLocaleString('id-ID')}`, 14, 20);
  const body = trades.map(t => [t.date, t.pair, t.direction, t.session, t.strategy||'-', t.lot, t.riskPct, t.rrTarget, fmtCurrency(t.pl,{sign:true}), fmtPct(t.plPct||0), t.followedPlan]);
  doc.autoTable({
    head: [['Date','Pair','Dir','Session','Strategy','Lot','Risk%','RR','PL($)','PL(%)','Plan']],
    body, startY: 26, styles: { fontSize: 8 }, headStyles: { fillColor: [11,16,32] },
  });
  doc.save(`${(profile?.accountName||'trades').replace(/\s+/g,'_')}_trades.pdf`);
}

function TradeHistory({ trades, profile }) {
  const [search, setSearch] = useState('');
  const [pairFilter, setPairFilter] = useState('all');
  const [monthFilter, setMonthFilter] = useState('all');
  const [yearFilter, setYearFilter] = useState('all');
  const [strategyFilter, setStrategyFilter] = useState('all');
  const [resultFilter, setResultFilter] = useState('all');
  const [sortBy, setSortBy] = useState('date_desc');
  const [editing, setEditing] = useState(null);
  const [formOpen, setFormOpen] = useState(false);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const dispatch = window.__tjDispatch;

  const pairs = useMemo(() => Array.from(new Set(trades.map(t => t.pair).filter(Boolean))).sort(), [trades]);
  const strategies = useMemo(() => Array.from(new Set(trades.map(t => t.strategy).filter(Boolean))).sort(), [trades]);
  const years = useMemo(() => Array.from(new Set(trades.map(t => (t.date||'').slice(0,4)).filter(Boolean))).sort().reverse(), [trades]);
  const months = [
    ['01','Januari'],['02','Februari'],['03','Maret'],['04','April'],['05','Mei'],['06','Juni'],
    ['07','Juli'],['08','Agustus'],['09','September'],['10','Oktober'],['11','November'],['12','Desember'],
  ];

  const filtered = useMemo(() => {
    let list = [...trades];
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(t => (t.pair||'').toLowerCase().includes(q) || (t.strategy||'').toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q));
    }
    if (pairFilter !== 'all') list = list.filter(t => t.pair === pairFilter);
    if (strategyFilter !== 'all') list = list.filter(t => t.strategy === strategyFilter);
    if (monthFilter !== 'all') list = list.filter(t => (t.date||'').slice(5,7) === monthFilter);
    if (yearFilter !== 'all') list = list.filter(t => (t.date||'').slice(0,4) === yearFilter);
    if (resultFilter === 'profit') list = list.filter(t => Number(t.pl) > 0);
    if (resultFilter === 'loss') list = list.filter(t => Number(t.pl) < 0);

    switch (sortBy) {
      case 'date_asc': list.sort((a,b) => (a.date||'').localeCompare(b.date||'')); break;
      case 'date_desc': list.sort((a,b) => (b.date||'').localeCompare(a.date||'')); break;
      case 'pl_desc': list.sort((a,b) => (Number(b.pl)||0) - (Number(a.pl)||0)); break;
      case 'pl_asc': list.sort((a,b) => (Number(a.pl)||0) - (Number(b.pl)||0)); break;
      case 'pair': list.sort((a,b) => (a.pair||'').localeCompare(b.pair||'')); break;
    }
    return list;
  }, [trades, search, pairFilter, strategyFilter, monthFilter, yearFilter, resultFilter, sortBy]);

  const totalPL = filtered.reduce((s,t) => s + (Number(t.pl)||0), 0);

  return (
    <div className="space-y-4 anim-in">
      <Card className="p-4">
        <div className="flex flex-col lg:flex-row lg:items-center gap-3">
          <div className="relative flex-1 min-w-[180px]">
            <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
            <TextInput value={search} onChange={e => setSearch(e.target.value)} placeholder="Cari pair, strategy, catatan..." className="pl-9" />
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:flex gap-2">
            <Select value={pairFilter} onChange={e => setPairFilter(e.target.value)} className="!w-auto text-xs"><option value="all">Semua Pair</option>{pairs.map(p => <option key={p} value={p}>{p}</option>)}</Select>
            <Select value={strategyFilter} onChange={e => setStrategyFilter(e.target.value)} className="!w-auto text-xs"><option value="all">Semua Strategy</option>{strategies.map(s => <option key={s} value={s}>{s}</option>)}</Select>
            <Select value={monthFilter} onChange={e => setMonthFilter(e.target.value)} className="!w-auto text-xs"><option value="all">Semua Bulan</option>{months.map(([v,l]) => <option key={v} value={v}>{l}</option>)}</Select>
            <Select value={yearFilter} onChange={e => setYearFilter(e.target.value)} className="!w-auto text-xs"><option value="all">Semua Tahun</option>{years.map(y => <option key={y} value={y}>{y}</option>)}</Select>
            <Select value={resultFilter} onChange={e => setResultFilter(e.target.value)} className="!w-auto text-xs"><option value="all">Profit & Loss</option><option value="profit">Profit</option><option value="loss">Loss</option></Select>
            <Select value={sortBy} onChange={e => setSortBy(e.target.value)} className="!w-auto text-xs">
              <option value="date_desc">Tanggal Terbaru</option><option value="date_asc">Tanggal Terlama</option>
              <option value="pl_desc">P/L Tertinggi</option><option value="pl_asc">P/L Terendah</option><option value="pair">Pair A-Z</option>
            </Select>
          </div>
        </div>
        <div className="flex items-center justify-between mt-3 pt-3 border-t border-white/[0.06]">
          <div className="text-xs text-slate-500">{filtered.length} trade · Total: <span className={`num font-semibold ${totalPL>0?'text-up-text':totalPL<0?'text-down-text':'text-slate-300'}`}>{fmtCurrency(totalPL,{sign:true})}</span></div>
          <div className="flex gap-1.5">
            <Button size="sm" variant="outline" onClick={() => exportCSV(filtered, profile)}><Icon name="download" className="w-3.5 h-3.5" />CSV</Button>
            <Button size="sm" variant="outline" onClick={() => exportExcel(filtered, profile)}><Icon name="download" className="w-3.5 h-3.5" />Excel</Button>
            <Button size="sm" variant="outline" onClick={() => exportPDF(filtered, profile)}><Icon name="download" className="w-3.5 h-3.5" />PDF</Button>
          </div>
        </div>
      </Card>

      {filtered.length === 0 ? (
        <Card><EmptyState icon="history" title="Belum ada trade" desc="Trade yang cocok dengan filter akan muncul di sini." /></Card>
      ) : (
        <Card className="overflow-hidden">
          <div className="hidden lg:grid grid-cols-[90px_80px_60px_80px_1fr_60px_70px_60px_100px_70px_60px] gap-2 px-4 py-2.5 text-[10px] font-medium text-slate-500 border-b border-white/[0.06] uppercase tracking-wide">
            <span>Tanggal</span><span>Pair</span><span>Arah</span><span>Session</span><span>Strategy</span><span>Lot</span><span>Risk</span><span>RR</span><span>P/L</span><span>P/L %</span><span>Plan</span>
          </div>
          <div className="divide-y divide-white/[0.04] max-h-[560px] overflow-y-auto">
            {filtered.map(t => (
              <button key={t.id} onClick={() => { setEditing(t); setFormOpen(true); }}
                className="w-full grid grid-cols-2 lg:grid-cols-[90px_80px_60px_80px_1fr_60px_70px_60px_100px_70px_60px] gap-2 px-4 py-3 text-xs text-left hover:bg-white/[0.03] transition-colors items-center">
                <span className="text-slate-400 lg:col-auto col-span-2 order-1">{fmtDate(t.date)}</span>
                <span className="font-semibold text-slate-100">{t.pair}</span>
                <span><Badge tone={t.direction === 'buy' ? 'up' : 'down'}>{t.direction === 'buy' ? 'BUY' : 'SELL'}</Badge></span>
                <span className="text-slate-500 hidden lg:inline">{t.session}</span>
                <span className="text-slate-500 truncate hidden lg:inline">{t.strategy || '-'}</span>
                <span className="text-slate-500 hidden lg:inline num">{t.lot || '-'}</span>
                <span className="text-slate-500 hidden lg:inline num">{t.riskPct ? t.riskPct+'%' : '-'}</span>
                <span className="text-slate-500 hidden lg:inline num">{t.rrTarget || '-'}</span>
                <span className={`font-semibold num ${t.pl>0?'text-up-text':t.pl<0?'text-down-text':'text-slate-400'}`}>{fmtCurrency(t.pl,{sign:true})}</span>
                <span className={`hidden lg:inline num ${t.pl>0?'text-up-text':t.pl<0?'text-down-text':'text-slate-500'}`}>{fmtPct(t.plPct||0)}</span>
                <span className="hidden lg:inline">{t.followedPlan === 'yes' ? <Icon name="check" className="w-3.5 h-3.5 text-up" /> : <Icon name="close" className="w-3.5 h-3.5 text-down" />}</span>
              </button>
            ))}
          </div>
        </Card>
      )}

      <TradeFormModal open={formOpen} onClose={() => setFormOpen(false)} initial={editing}
        balanceBeforeTrade={dispatch.balanceBeforeTrade(editing)}
        onSave={(t) => { dispatch.saveTrade(t); setFormOpen(false); }}
        onRequestDelete={(id) => { setFormOpen(false); dispatch.confirmDeleteTrade(id); }} />
    </div>
  );
}

if (window.Chart) {
  Chart.defaults.color = '#8592AD';
  Chart.defaults.font.family = "'Inter', ui-sans-serif, sans-serif";
  Chart.defaults.font.size = 11;
  Chart.defaults.borderColor = 'rgba(148,163,184,0.08)';
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.boxWidth = 7;
  Chart.defaults.plugins.legend.labels.boxHeight = 7;
}

const CLR = { up: '#22D3A5', down: '#FB4B63', brand: '#5B8CFF', amber: '#F5B84E', grid: 'rgba(148,163,184,0.08)', upSoft: 'rgba(34,211,165,0.15)', downSoft: 'rgba(251,75,99,0.15)', brandSoft: 'rgba(91,140,255,0.18)' };

function ChartCanvas({ type, data, options, height = 260 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const dataKey = useMemo(() => JSON.stringify(data), [data]);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    chartRef.current = new Chart(canvasRef.current.getContext('2d'), { type, data, options: { responsive: true, maintainAspectRatio: false, ...options } });
    return () => { chartRef.current && chartRef.current.destroy(); };
  }, [dataKey, type]);

  return <div style={{ height }}><canvas ref={canvasRef} /></div>;
}

function ChartCard({ title, children, span = '' }) {
  return (
    <Card className={`p-4 sm:p-5 ${span}`}>
      <h3 className="font-display font-semibold text-sm text-slate-200 mb-4">{title}</h3>
      {children}
    </Card>
  );
}

function barColors(values) { return values.map(v => v >= 0 ? CLR.up : CLR.down); }

function Statistics({ trades, profile }) {
  const metrics = useMemo(() => computeMetrics(trades, profile), [trades, profile]);

  if (trades.length === 0) {
    return <Card><EmptyState icon="chart" title="Belum ada data statistik" desc="Tambahkan trade untuk melihat equity curve, win rate, dan performa lainnya." /></Card>;
  }

  // 1. Equity curve
  const eqLabels = metrics.equityPoints.map((p, i) => i === 0 ? 'Start' : fmtDate(p.date, { day: '2-digit', month: 'short' }));
  const equityCurveData = {
    labels: eqLabels,
    datasets: [{ label: 'Balance', data: metrics.equityPoints.map(p => p.balance), borderColor: CLR.brand, backgroundColor: CLR.brandSoft, fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2 }],
  };

  // 2. Balance growth (%)
  const growthData = {
    labels: eqLabels,
    datasets: [{ label: 'Growth %', data: metrics.equityPoints.map(p => metrics.initial > 0 ? ((p.balance - metrics.initial) / metrics.initial) * 100 : 0), borderColor: CLR.up, backgroundColor: CLR.upSoft, fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2 }],
  };

  // 3. Monthly performance
  const monthEntries = Object.entries(metrics.byMonth).sort(([a], [b]) => a.localeCompare(b));
  const monthlyData = {
    labels: monthEntries.map(([k]) => { const [y, m] = k.split('-'); return new Date(y, m - 1, 1).toLocaleDateString('id-ID', { month: 'short', year: '2-digit' }); }),
    datasets: [{ label: 'P/L', data: monthEntries.map(([, v]) => v), backgroundColor: barColors(monthEntries.map(([, v]) => v)), borderRadius: 6, maxBarThickness: 34 }],
  };

  // 4. Win rate
  const winRateData = {
    labels: ['Win', 'Loss', 'Breakeven'],
    datasets: [{ data: [metrics.wins, metrics.losses, metrics.breakeven], backgroundColor: [CLR.up, CLR.down, '#475569'], borderWidth: 0 }],
  };

  // 5. Profit distribution (histogram buckets)
  const plValues = trades.map(t => Number(t.pl) || 0);
  const minPl = Math.min(...plValues, 0), maxPl = Math.max(...plValues, 0);
  const bucketCount = 6;
  const range = Math.max(maxPl - minPl, 1);
  const bucketSize = range / bucketCount;
  const buckets = Array.from({ length: bucketCount }, (_, i) => ({ from: minPl + i * bucketSize, to: minPl + (i + 1) * bucketSize, count: 0 }));
  plValues.forEach(v => { let idx = Math.floor((v - minPl) / bucketSize); idx = clamp(idx, 0, bucketCount - 1); buckets[idx].count++; });
  const distData = {
    labels: buckets.map(b => `${b.from >= 0 ? '+' : ''}${b.from.toFixed(0)}`),
    datasets: [{ label: 'Jumlah Trade', data: buckets.map(b => b.count), backgroundColor: buckets.map(b => (b.from + b.to) / 2 >= 0 ? CLR.up : CLR.down), borderRadius: 6, maxBarThickness: 40 }],
  };

  // 6. Session performance
  const sessionEntries = Object.entries(metrics.bySession);
  const sessionData = {
    labels: sessionEntries.map(([k]) => k),
    datasets: [{ label: 'P/L', data: sessionEntries.map(([, v]) => v.pl), backgroundColor: barColors(sessionEntries.map(([, v]) => v.pl)), borderRadius: 6, maxBarThickness: 46 }],
  };

  // 7. Pair performance
  const pairEntries = Object.entries(metrics.byPair).sort((a, b) => b[1].pl - a[1].pl);
  const pairData = {
    labels: pairEntries.map(([k]) => k),
    datasets: [{ label: 'P/L', data: pairEntries.map(([, v]) => v.pl), backgroundColor: barColors(pairEntries.map(([, v]) => v.pl)), borderRadius: 6, maxBarThickness: 30 }],
  };

  // 8. Strategy performance
  const stratEntries = Object.entries(metrics.byStrategy).sort((a, b) => b[1].pl - a[1].pl);
  const stratData = {
    labels: stratEntries.map(([k]) => k),
    datasets: [{ label: 'P/L', data: stratEntries.map(([, v]) => v.pl), backgroundColor: barColors(stratEntries.map(([, v]) => v.pl)), borderRadius: 6, maxBarThickness: 30 }],
  };

  // 9. Risk distribution
  const riskEntries = Object.entries(metrics.riskBuckets);
  const riskData = {
    labels: riskEntries.map(([k]) => k),
    datasets: [{ data: riskEntries.map(([, v]) => v), backgroundColor: [CLR.up, '#5FE3C0', CLR.amber, '#F58E4E', CLR.down], borderWidth: 0 }],
  };

  // 10. Drawdown chart
  const ddData = {
    labels: eqLabels,
    datasets: [{ label: 'Drawdown %', data: metrics.equityPoints.map(p => -p.drawdownPct), borderColor: CLR.down, backgroundColor: 'rgba(251,75,99,0.18)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 }],
  };

  const gridOpt = { grid: { color: CLR.grid, drawTicks: false }, ticks: { padding: 6 } };
  const lineOptsBase = {
    plugins: { legend: { display: false } },
    scales: { x: { grid: { display: false }, ticks: { maxTicksLimit: 7 } }, y: gridOpt },
    interaction: { intersect: false, mode: 'index' },
  };
  const barOptsBase = {
    plugins: { legend: { display: false } },
    scales: { x: { grid: { display: false } }, y: gridOpt },
  };
  const doughnutOptsBase = { plugins: { legend: { position: 'bottom' } }, cutout: '68%' };

  return (
    <div className="space-y-5 anim-in">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3.5">
        <StatCard label="Net P/L" value={fmtCurrency(metrics.netPL, { sign: true })} tone={metrics.netPL > 0 ? 'up' : 'down'} />
        <StatCard label="ROI" value={fmtPct(metrics.roi)} tone={metrics.roi >= 0 ? 'up' : 'down'} />
        <StatCard label="Win Rate" value={metrics.winRate.toFixed(1) + '%'} />
        <StatCard label="Profit Factor" value={isFinite(metrics.profitFactor) ? metrics.profitFactor.toFixed(2) : '∞'} />
      </div>

      <div className="grid lg:grid-cols-2 gap-5">
        <ChartCard title="Equity Curve"><ChartCanvas type="line" data={equityCurveData} options={lineOptsBase} /></ChartCard>
        <ChartCard title="Balance Growth (%)"><ChartCanvas type="line" data={growthData} options={lineOptsBase} /></ChartCard>
        <ChartCard title="Monthly Performance"><ChartCanvas type="bar" data={monthlyData} options={barOptsBase} /></ChartCard>
        <ChartCard title="Drawdown Chart"><ChartCanvas type="line" data={ddData} options={{ ...lineOptsBase, scales: { ...lineOptsBase.scales, y: { ...gridOpt, max: 0 } } }} /></ChartCard>
        <ChartCard title="Win Rate"><ChartCanvas type="doughnut" data={winRateData} options={doughnutOptsBase} height={240} /></ChartCard>
        <ChartCard title="Profit Distribution"><ChartCanvas type="bar" data={distData} options={barOptsBase} /></ChartCard>
        <ChartCard title="Session Performance"><ChartCanvas type="bar" data={sessionData} options={barOptsBase} /></ChartCard>
        <ChartCard title="Risk Distribution"><ChartCanvas type="doughnut" data={riskData} options={doughnutOptsBase} height={240} /></ChartCard>

function LoadingScreen() {
  return (
    <div className="min-h-screen flex flex-col items-center justify-center gap-4">

function serializeBackup(profiles, trades, journals, targets) {
  return JSON.stringify({ app: 'TradeJournalPro', version: 1, exportedAt: new Date().toISOString(), profiles, trades, journals, targets }, null, 2);
}

function App() {
  const [ready, setReady] = useState(false);
  const [profiles, setProfiles] = useState([]);
  const [activeProfileId, setActiveProfileId] = useState(null);
  const [showPicker, setShowPicker] = useState(false);
  const [showSetup, setShowSetup] = useState(false);

  const [trades, setTrades] = useState([]);
  const [journals, setJournals] = useState([]);
  const [targets, setTargets] = useState(null);

  const [view, setView] = useState('dashboard');
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [profileManagerOpen, setProfileManagerOpen] = useState(false);
  const [quickAddOpen, setQuickAddOpen] = useState(false);
  const [deleteTradeId, setDeleteTradeId] = useState(null);
  const [pendingRestoreFile, setPendingRestoreFile] = useState(null);

  const { toasts, push, remove } = useToasts();

  useEffect(() => { init(); }, []);

  async function init() {
    try {
      const ps = await dbGetAll('profiles');
      setProfiles(ps);
      if (ps.length === 0) { setShowSetup(true); setReady(true); return; }
      const meta = await dbGet('meta', 'activeProfileId');
      const active = meta && ps.find(p => p.id === meta.value) ? meta.value : null;
      if (active) { setActiveProfileId(active); }
      else { setShowPicker(true); }
      setReady(true);
    } catch (err) {
      console.error(err);
      setReady(true);
    }
  }

  useEffect(() => {
    if (activeProfileId) loadProfileData(activeProfileId);
  }, [activeProfileId]);

  async function loadProfileData(pid) {
    const [t, j, tg] = await Promise.all([
      dbGetAll('trades', 'profileId', pid),
      dbGetAll('journals', 'profileId', pid),
      dbGet('targets', pid),
    ]);
    setTrades(t);
    setJournals(j);
    setTargets(tg);
  }

  async function handleProfileCreated(profile) {
    await dbPut('profiles', profile);
    await dbPut('meta', { key: 'activeProfileId', value: profile.id });
    setProfiles(p => [...p, profile]);
    setActiveProfileId(profile.id);
    setShowSetup(false); setShowPicker(false);
    push('Profil berhasil dibuat. Selamat trading!', 'up');
  }

  async function handleSelectProfile(pid) {
    await dbPut('meta', { key: 'activeProfileId', value: pid });
    setActiveProfileId(pid);
    setShowPicker(false);
  }

  async function handleSwitchProfile(pid) {
    await dbPut('meta', { key: 'activeProfileId', value: pid });
    setActiveProfileId(pid);
    setProfileManagerOpen(false);
    push('Profil aktif diganti', 'brand');
  }

  async function handleSaveProfile(profile) {
    const isNew = !profiles.find(p => p.id === profile.id);
    await dbPut('profiles', profile);
    setProfiles(list => isNew ? [...list, profile] : list.map(p => p.id === profile.id ? profile : p));
    if (activeProfileId === profile.id) { /* refresh header info implicitly via state */ }
    push(isNew ? 'Profil ditambahkan' : 'Profil diperbarui', 'up');
  }

  async function handleDeleteProfile(pid) {
    await dbDelete('profiles', pid);
    await dbClearByIndex('trades', 'profileId', pid);
    await dbClearByIndex('journals', 'profileId', pid);
    await dbDelete('targets', pid);
    const remaining = profiles.filter(p => p.id !== pid);
    setProfiles(remaining);
    push('Profil dihapus', 'down');
    if (pid === activeProfileId) {
      if (remaining.length > 0) {
        await handleSwitchProfile(remaining[0].id);
      } else {
        await dbDelete('meta', 'activeProfileId');
        setActiveProfileId(null); setTrades([]); setJournals([]); setTargets(null);
        setShowSetup(true); setProfileManagerOpen(false);
      }
    }
  }

  async function handleResetTrades(pid) {
    await dbClearByIndex('trades', 'profileId', pid);
    if (pid === activeProfileId) setTrades([]);
    push('Semua trade pada profil ini telah direset', 'brand');
  }

  async function handleExportProfile(pid) {
    const p = profiles.find(x => x.id === pid);
    const [t, j, tg] = await Promise.all([dbGetAll('trades', 'profileId', pid), dbGetAll('journals', 'profileId', pid), dbGet('targets', pid)]);
    const json = serializeBackup([p], t, j, tg ? [tg] : []);
    downloadBlob(`profil_${(p.accountName || 'trader').replace(/\s+/g, '_')}.json`, json, 'application/json');
    push('Profil diekspor', 'up');
  }

  async function handleImportProfile(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.profiles || !Array.isArray(data.profiles)) throw new Error('invalid');
      for (const p of data.profiles) {
        const newId = uid();
        const oldId = p.id;
        const newProfile = { ...p, id: newId };
        await dbPut('profiles', newProfile);
        setProfiles(list => [...list, newProfile]);
        const relTrades = (data.trades || []).filter(t => t.profileId === oldId);
        for (const t of relTrades) await dbPut('trades', { ...t, id: uid(), profileId: newId });
        const relJournals = (data.journals || []).filter(j => j.profileId === oldId);
        for (const j of relJournals) await dbPut('journals', { ...j, id: uid(), profileId: newId });
        const relTargets = (data.targets || []).filter(tg => tg.profileId === oldId);
        for (const tg of relTargets) await dbPut('targets', { ...tg, profileId: newId });
      }
      push('Profil berhasil diimpor', 'up');
    } catch (err) {
      console.error(err);
      push('Gagal mengimpor file. Pastikan format JSON valid.', 'down');
    }
  }

  async function handleBackupAll() {
    const allProfiles = await dbGetAll('profiles');
    const allTrades = await dbGetAll('trades');
    const allJournals = await dbGetAll('journals');
    const allTargets = await dbGetAll('targets');
    const json = serializeBackup(allProfiles, allTrades, allJournals, allTargets);
    downloadBlob(`tradejournal_backup_${todayISO()}.json`, json, 'application/json');
    push('Backup berhasil diunduh', 'up');
  }

  function handleRestoreAllRequest(file) { setPendingRestoreFile(file); }

  async function performRestore() {
    const file = pendingRestoreFile;
    setPendingRestoreFile(null);
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.profiles) throw new Error('invalid');
      await dbClearAll('profiles'); await dbClearAll('trades'); await dbClearAll('journals'); await dbClearAll('targets');
      for (const p of data.profiles) await dbPut('profiles', p);
      for (const t of (data.trades || [])) await dbPut('trades', t);
      for (const j of (data.journals || [])) await dbPut('journals', j);
      for (const tg of (data.targets || [])) await dbPut('targets', tg);
      push('Restore berhasil. Memuat ulang data...', 'up');
      const ps = await dbGetAll('profiles');
      setProfiles(ps);
      if (ps.length > 0) {
        await dbPut('meta', { key: 'activeProfileId', value: ps[0].id });
        setActiveProfileId(ps[0].id);
      } else {
        setActiveProfileId(null); setShowSetup(true);
      }
      setProfileManagerOpen(false);
    } catch (err) {
      console.error(err);
      push('Gagal restore. File backup tidak valid.', 'down');
    }
  }

  async function saveTrade(trade) {
    const full = { ...trade, profileId: activeProfileId };
    await dbPut('trades', full);
    setTrades(list => {
      const exists = list.find(t => t.id === full.id);
      return exists ? list.map(t => t.id === full.id ? full : t) : [...list, full];
    });
    push('Trade tersimpan', 'up');
  }

  function confirmDeleteTrade(id) { setDeleteTradeId(id); }
  async function performDeleteTrade() {
    const id = deleteTradeId; setDeleteTradeId(null);
    if (!id) return;
    await dbDelete('trades', id);
    setTrades(list => list.filter(t => t.id !== id));
    push('Trade dihapus', 'down');
  }

  function balanceBeforeTradeFn(editingTrade) {
    const metrics0 = computeMetrics(trades, activeProfile);
    if (!editingTrade || !editingTrade.id) return metrics0.balance;
    const sorted = sortTradesChrono(trades.filter(t => t.id !== editingTrade.id));
    let b = Number(activeProfile?.initialBalance) || 0;
    sorted.forEach(t => { b += Number(t.pl) || 0; });
    return b;
  }

  async function saveJournal(entry) {
    await dbPut('journals', entry);
    setJournals(list => {
      const exists = list.find(j => j.id === entry.id);
      return exists ? list.map(j => j.id === entry.id ? entry : j) : [...list, entry];
    });
    push('Jurnal tersimpan', 'up');
  }
  async function deleteJournal(id) {
    await dbDelete('journals', id);
    setJournals(list => list.filter(j => j.id !== id));
    push('Jurnal dihapus', 'down');
  }
  async function saveTargets(t) {
    await dbPut('targets', t);
    setTargets(t);
    push('Target tersimpan', 'up');
  }

  const activeProfile = profiles.find(p => p.id === activeProfileId) || null;

  // dispatch bridge for nested modals (Dashboard / History)
  window.__tjDispatch = { saveTrade, confirmDeleteTrade, balanceBeforeTrade: balanceBeforeTradeFn };

  if (!ready) return <LoadingScreen />;
  if (showSetup || profiles.length === 0) return <ProfileSetup onCreated={handleProfileCreated} hasExisting={profiles.length > 0} onBack={() => { setShowSetup(false); setShowPicker(true); }} />;
  if (showPicker || !activeProfile) return <ProfilePicker profiles={profiles} onSelect={handleSelectProfile} onCreateNew={() => setShowSetup(true)} />;

  const metrics = computeMetrics(trades, activeProfile);
  const propStatus = computePropStatus(trades, activeProfile, metrics);

  return (
    <div className="min-h-screen flex">
      <Sidebar view={view} setView={setView} profile={activeProfile} onManageProfiles={() => setProfileManagerOpen(true)} propStatus={propStatus} />
      <div className="flex-1 min-w-0 flex flex-col pb-16 md:pb-0">
        <TopBar view={view} profile={activeProfile} onAddTrade={() => setQuickAddOpen(true)} onOpenDrawer={() => setDrawerOpen(true)} />
        <main className="flex-1 p-4 sm:p-6 max-w-[1400px] w-full mx-auto">
          {view === 'dashboard' && <Dashboard trades={trades} profile={activeProfile} journals={journals} />}
          {view === 'history' && <TradeHistory trades={trades} profile={activeProfile} />}
          {view === 'statistics' && <Statistics trades={trades} profile={activeProfile} />}
          {view === 'analysis' && <Analysis trades={trades} profile={activeProfile} />}
          {view === 'targets' && <Targets trades={trades} profile={activeProfile} targets={targets} onSaveTargets={saveTargets} />}
          {view === 'journal' && <JournalPage journals={journals} profile={activeProfile} onSave={saveJournal} onDelete={deleteJournal} />}
        </main>
      </div>

      <MobileDrawer open={drawerOpen} onClose={() => setDrawerOpen(false)} view={view} setView={setView} onManageProfiles={() => setProfileManagerOpen(true)} />
      <MobileTabBar view={view} setView={setView} onOpenDrawer={() => setDrawerOpen(true)} />

      <ProfileManagerModal open={profileManagerOpen} onClose={() => setProfileManagerOpen(false)}
        profiles={profiles} activeProfileId={activeProfileId}
        onSwitch={handleSwitchProfile} onSave={handleSaveProfile} onDelete={handleDeleteProfile}
        onResetTrades={handleResetTrades} onExportProfile={handleExportProfile} onImportProfile={handleImportProfile}
        onBackupAll={handleBackupAll} onRestoreAll={handleRestoreAllRequest} push={push} />

      <TradeFormModal open={quickAddOpen} onClose={() => setQuickAddOpen(false)} initial={null}
        balanceBeforeTrade={metrics.balance}
        onSave={(t) => { saveTrade(t); setQuickAddOpen(false); }}
        onRequestDelete={() => {}} />

      <ConfirmDialog open={!!deleteTradeId} onClose={() => setDeleteTradeId(null)} title="Hapus Trade?" message="Data trade ini akan dihapus permanen dan mempengaruhi perhitungan balance." onConfirm={performDeleteTrade} />
      <ConfirmDialog open={!!pendingRestoreFile} onClose={() => setPendingRestoreFile(null)} title="Restore Backup?" message="Seluruh data saat ini (semua profil, trade, jurnal) akan digantikan dengan isi file backup. Tindakan ini tidak dapat dibatalkan." onConfirm={performRestore} confirmLabel="Restore" />

      <Lightbox />
      <ToastHost toasts={toasts} remove={remove} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

</script>
</body>
</html>
